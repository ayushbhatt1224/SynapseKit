name: Discord Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed]
  issues:
    types: [labeled]
  release:
    types: [published]
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Post to #contributors-chat
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_CONTRIBUTORS }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Push to main\",\"description\":\"**${COMMIT_MSG}**\n\n[View commit](${URL})\",\"color\":5793266,\"footer\":{\"text\":\"${AUTHOR}\"}}]}"

  notify-pr-opened:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Post to #pr-feed
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          URL="${{ github.event.pull_request.html_url }}"
          NUMBER="${{ github.event.pull_request.number }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_PR_FEED }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"PR #${NUMBER} opened\",\"description\":\"**${TITLE}**\n\n[View PR](${URL})\",\"color\":3447003,\"footer\":{\"text\":\"${AUTHOR}\"}}]}"

  notify-pr-merged:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post to #pr-feed
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          URL="${{ github.event.pull_request.html_url }}"
          NUMBER="${{ github.event.pull_request.number }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_PR_FEED }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ PR #${NUMBER} merged\",\"description\":\"**${TITLE}**\n\n[View PR](${URL})\",\"color\":5763719,\"footer\":{\"text\":\"${AUTHOR}\"}}]}"

  notify-good-first-issue:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'good first issue'
    runs-on: ubuntu-latest
    steps:
      - name: Post to #good-first-issues
        run: |
          TITLE="${{ github.event.issue.title }}"
          URL="${{ github.event.issue.html_url }}"
          NUMBER="${{ github.event.issue.number }}"
          AUTHOR="${{ github.event.issue.user.login }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_GOOD_FIRST_ISSUES }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"👋 Good first issue #${NUMBER}\",\"description\":\"**${TITLE}**\n\n[View issue](${URL})\",\"color\":10181046,\"footer\":{\"text\":\"opened by ${AUTHOR}\"}}]}"

  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Post to #contributors-chat
        run: |
          TAG="${{ github.event.release.tag_name }}"
          URL="${{ github.event.release.html_url }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_CONTRIBUTORS }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"🚀 Released ${TAG}\",\"description\":\"[View release](${URL})\",\"color\":15844367}]}"

  notify-ci-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Post to #contributors-chat
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ACTOR="${{ github.event.workflow_run.triggering_actor.login }}"
          URL="${{ github.event.workflow_run.html_url }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_CONTRIBUTORS }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ CI failed on ${BRANCH}\",\"description\":\"[View run](${URL})\",\"color\":15158332,\"footer\":{\"text\":\"triggered by ${ACTOR}\"}}]}"
